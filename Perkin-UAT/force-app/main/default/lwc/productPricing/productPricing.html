<template lwc:render-mode="light">
    <div
        if:true={isPriceAvailable}
        class={layoutClass}>
        <span
            if:true={displayNegotiatedPrice}
            aria-live="assertive"
            aria-atomic="true"
            class="price-col slds-col slds-p-right_x-small">
            <span
                if:true={hasNegotiatedPriceLabel}
                class="price-col-section slds-text-heading_small slds-p-right_x-small">
                {negotiatedPriceLabel}:
            </span>
            <!-- <span class="price-col-section">
                <s>
                    <lightning-formatted-number
                        value={promotionSalesPrice}
                        currency-code={currencyCode}
                        format-style="currency">
                    </lightning-formatted-number>
                </s>

                <lightning-formatted-number
                    class="negotiated-price price-label negotiatedPrice"
                    value={negotiatedPrice}
                    maximum-fraction-digits="20"
                    currency-code={currencyCode}
                    format-style="currency">
                </lightning-formatted-number>

                <template if:true={savedAmount}>
                    <div class="product-saved">
                        Saved
                        <lightning-formatted-number
                            value={savedAmount}
                            currency-code={currencyCode}
                            format-style="currency">
                        </lightning-formatted-number>
                    </div>
                </template>

            </span> -->

            <span class="price-col-section">
                <div class="price-row">
                    <!-- <s class="strike-price">
                        <lightning-formatted-number
                            value={promotionSalesPrice}
                            currency-code={currencyCode}
                            format-style="currency">
                        </lightning-formatted-number>
                    </s> -->

                    <lightning-formatted-number
                        class="negotiated-price"
                        value={negotiatedPrice}
                        maximum-fraction-digits="20"
                        currency-code={currencyCode}
                        format-style="currency">
                    </lightning-formatted-number>
                </div>

                <template if:true={savedAmount}>
                    <div class="product-saved">
                        {Saved}:
                        <lightning-formatted-number
                            value={savedAmount}
                            currency-code={currencyCode}
                            format-style="currency">
                        </lightning-formatted-number>
                    </div>
                </template>
            </span>

        </span>
        <span
            if:true={displayOriginalPrice}
            aria-live="assertive"
            aria-atomic="true"
            class="price-col slds-col slds-p-right_x-small">
            <span
                if:true={hasOriginalPriceLabel}
                class="price-col-section slds-text-heading_small slds-p-right_x-small">
                {originalPriceLabel}:
            </span>
            <span class="price-col-section">
                <span
                    if:true={displayAssistiveText}
                    class="slds-assistive-text">
                    {strikethroughAssistiveText}
                </span>
                <lightning-formatted-number
                    class="original-price price-label originalPrice"
                    value={originalPrice}
                    maximum-fraction-digits="20"
                    currency-code={currencyCode}
                    format-style="currency"></lightning-formatted-number>
            </span>
        </span>
    </div>
    <div
        class="tax-container"
        if:true={taxInfoVisible}>
        <p class="tax-info-label">{taxIncludedLabel}</p>
    </div>
    <div
        if:false={isPriceAvailable}
        class="price-unavailable" onclick={handlePleaseEnquire}>
        {unavailablePriceLabel}
        <!-- <lightning-button variant="base" label={unavailablePriceLabel} title={unavailablePriceLabel} onclick={handlePleaseEnquire} class="slds-m-left_x-small"></lightning-button> -->
    </div>
</template>
