<template lwc:render-mode="light">
    <div class="slds-var-p-around_medium">
        <header class="slds-var-p-vertical_x-small">
            <slot name="headerText"></slot>
        </header>

        <template lwc:if={showCartSummary}>
            <!-- Subtotal Price Info -->
            <div
                class="item subtotal-price slds-var-p-vertical_x-small"
                aria-live="assertive"
                aria-atomic="true"
                data-subtotal
            >
                <slot name="subtotalLabel"></slot>
                <lightning-formatted-number
                    value={cartSubTotal}
                    format-style="currency" 
                    currency-code={currencyCode}
                    display-currency-as="symbol"
                ></lightning-formatted-number>
            </div>

            <!-- Shipping Info -->
            <div
                lwc:if={shippingAmt}
                class="item shipping-price slds-var-p-vertical_x-small"
                aria-live="assertive"
                aria-atomic="true"
                data-shipping
            >
                <slot name="shippingLabel"></slot>
                <lightning-formatted-number
                    value={shippingAmt}
                    format-style="currency" 
                    currency-code={currencyCode}
                    display-currency-as="symbol"
                ></lightning-formatted-number>
            </div>

            <!-- Discount Amount Info ( Promotions ) -->
            <div
                lwc:if={cartPromotion}
                class="item discount-amount slds-var-p-vertical_x-small"
                aria-live="polite"
                aria-atomic="true"
                data-discount
            >
                <slot name="promotionsLabel"></slot>
                <lightning-formatted-number
                    value={cartPromotion}
                    format-style="currency" 
                    currency-code={currencyCode}
                    display-currency-as="symbol"
                ></lightning-formatted-number>
            </div>

            <!-- Tax Price Info -->
            <div
                lwc:if={taxAmt}
                class="item tax-price slds-var-p-vertical_x-small"
                aria-live="assertive"
                aria-atomic="true"
                data-tax
            >
                <slot name="taxLabel"></slot>
                <lightning-formatted-number
                    value={taxAmt}
                    format-style="currency" 
                    currency-code={currencyCode}
                    display-currency-as="symbol"
                ></lightning-formatted-number>
            </div>

            <!-- Total Price Info -->
            <div class="item total-price slds-var-p-vertical_x-small" aria-live="assertive" aria-atomic="true">
                <slot name="totalLabel"></slot>
                <lightning-formatted-number
                    value={grandTotal}
                    format-style="currency" 
                    currency-code={currencyCode}
                    display-currency-as="symbol"
                ></lightning-formatted-number>
            </div>

            <!-- Tax Included Display -->
            <div class="tax-included-label">
                <slot name="taxIncludedLabel"></slot>
            </div>
        </template>
        <template lwc:else>
            <div class="slds-grid slds-gutters slds-var-p-vertical_x-small">
                <div class="slds-col slds-size_2-of-3">
                    <c-stencil height="20" width="85%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>
            </div>

            <div class="slds-grid slds-gutters slds-var-p-vertical_x-small">
                <div class="slds-col slds-size_2-of-3">
                    <c-stencil height="20" width="85%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>
            </div>

            <div class="slds-grid slds-gutters slds-var-p-vertical_x-small">
                <div class="slds-col slds-size_2-of-3">
                    <c-stencil height="20" width="85%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-3">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>
            </div>
        </template>
    </div>
</template>
