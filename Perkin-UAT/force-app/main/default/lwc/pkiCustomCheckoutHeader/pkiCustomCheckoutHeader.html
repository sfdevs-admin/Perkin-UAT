<template> 
    <div class="pki-site-banner">
        <slot name="checkout-site-banner"></slot>
    </div>
    <header class="pki-custom-commerce-header">
        <div class="pki-header-grid">
            <!-- Left Column -->
            <div class="pki-header-column" >
                <div class="pki-mnav-mobile">
                    <lightning-button variant="base" label={labels.backLabel} title={labels.backLabel} icon-name="utility:chevronleft" onclick={handleBackToCart}></lightning-button>
                </div>
                <div class="pki-mnav-logo-desktop">
                    <!-- <slot name="headerLogo"></slot> -->
                    <lightning-button variant="base" label={labels.backToCartLabel} title={labels.backToCartLabel} icon-name="utility:chevronleft" onclick={handleBackToCart}></lightning-button>
                </div>
            </div>

            <!-- Center Column -->
            <div class="pki-header-column">
                <div class="pki-header-inner-grid">
                    <div class="pki-header-inner-column">
                        <div class="pki-mnav-desktop">
                            <slot name="checkoutHeaderLogo"></slot>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </header>
</template>
