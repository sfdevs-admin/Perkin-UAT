<template>
    <template lwc:if={showFields}>
        <lightning-combobox
            name="Select Your Shipping Provider"
            label="Select Your Shipping Provider"
            value={value}
            options={options}
            onchange={handleChange}
            required ></lightning-combobox>

        <lightning-input type="text" 
                         name="Enter Your Shipping Provider Account Number" 
                         label="Enter Your Shipping Provider Account Number" 
                         onchange={handleNumberChange} required></lightning-input>
    </template>
    <template lwc:else>

    </template>

        </div>
    </div> -->
</template>
