<template lwc:render-mode="light">
    <div class="slds-grid slds-gutters slds-wrap header-section">
        <div class="slds-col slds-large-size_3-of-12 slds-medium-size_3-of-12 slds-size_1-of-1 slds-var-m-bottom_medium header-section">
            <slot name="cartItemsTitle"></slot> 
            &nbsp;
            <span lwc:if={showCount}>({showCount})</span>
        </div>
        <div lwc:if={clearCartAndSortOptions} class="slds-col slds-large-size_5-of-12 slds-medium-size_5-of-12 slds-size_1-of-1 slds-var-m-bottom_medium">
            <a class="clear-cart" onclick={handleClearCart}>{labels.ClearCartBtn}</a>
        </div>
        <div lwc:if={clearCartAndSortOptions} class="slds-col slds-large-size_4-of-12 slds-medium-size_4-of-12 slds-size_1-of-1 float-right slds-var-m-bottom_medium">
            <label class="select" for="slct">
            <select class="custom-select" id="slct" required="required" onchange={handleSortChange}>
                <template for:each={sortingOptions} for:item="opt">
                    <option key={opt.label} value={opt.value} selected={opt.selected}>{opt.label}</option>
                </template>
            </select>
            </label>
        </div>
    </div>
    <div lwc:if={isSubscriptionCart}>
        <div  class="slds-m-vertical--medium slds-p-around--xx-small subscription-msg">
            {billingFrequency} 
        </div>
        <hr class="separator" />
    </div>
    
    <template lwc:if={isCartItemsAvailable}>
            <ul>
                <template for:each={cartItemsToShow} for:item="item">
                    <li key={item.id}>
                        <c-b2b-cart-item item={item.cartItem}
                            labels={labels} is-preview={isPreview}
                            show-remove-item-option={showRemoveOption}
                            show-line-item-total={showLineItemTotal}
                            show-original-price={showOriginalPrice}
                            show-sku={showSKU}
                            show-product-image={showProductImage}
                            product-fields={productFields}
                            show-price-per-unit={showPricePerUnit}
                            show-actual-price={showActualPrice}
                            hide-quantity-selector={hideQuantitySelector}
                            show-promotions={showPromotions}
                            is-subscription-cart={isSubscriptionCart}
                            ondeletecartitem={handleDeleteCartItem}
                            onloadingstencil={handleLoadingStencil}
                            onnavigatetoproduct={handleProductNavigation}>
                        </c-b2b-cart-item>
                        <hr class="separator" />
                    </li>
                </template>
            </ul>

            <div lwc:if={needsToShowMore} class="slds-align_absolute-center">
                <lightning-button
                    onclick={handleShowMoreButton} variant="base"
                    label={labels.ShowMoreLabel} title={labels.ShowMoreLabel}
                    class="slds-var-m-left_x-small">
                </lightning-button>
            </div>
    </template>
    <!-- <template lwc:else> -->

    <template lwc:if={isLoading}>
        <div class="slds-grid slds-gutters slds-wrap slds-var-p-around_small">
            <div class="slds-col slds-size_4-of-12 slds-large-size_2-of-12 slds-var-p-right_xxx-small">
                <c-stencil height="130" width="100%" border-radius="0"></c-stencil>
            </div>
            <div class="slds-col slds-grid slds-wrap slds-size_8-of-12 slds-large-size_10-of-12">
                <div class="slds-col slds-size_1-of-1 slds-large-size_6-of-12">
                    <c-stencil height="40" width="100%" border-radius="1px"></c-stencil>
                    <div class="slds-var-m-top_small">
                        <c-stencil height="20" width="60%" border-radius="5px"></c-stencil>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12 slds-var-m-top_large">
                    <c-stencil height="30" width="100%" border-radius="1px"></c-stencil>
                    <c-stencil height="20" width="40%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12 slds-var-m-top_large">
                    <c-stencil height="20" width="40%" border-radius="5px"></c-stencil>
                </div>
            </div>
        </div>
        
        <div class="slds-grid slds-gutters slds-wrap slds-var-p-around_small">
            <div class="slds-col slds-size_4-of-12 slds-large-size_2-of-12 slds-var-p-right_xxx-small">
                <c-stencil height="130" width="100%" border-radius="0"></c-stencil>
            </div>
            <div class="slds-col slds-grid slds-wrap slds-size_8-of-12 slds-large-size_10-of-12">

                    <div class="slds-var-m-top_small">
                        <c-stencil height="20" width="60%" border-radius="5px"></c-stencil>
                    </div>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12">
                    <c-stencil height="20" width="100%" border-radius="5px"></c-stencil>
                </div>

                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12 slds-var-m-top_large">
                    <c-stencil height="30" width="100%" border-radius="1px"></c-stencil>
                    <c-stencil height="20" width="40%" border-radius="5px"></c-stencil>
                </div>
                <div class="slds-col slds-size_1-of-1 slds-large-size_3-of-12 slds-var-m-top_large">
                    <c-stencil height="20" width="40%" border-radius="5px"></c-stencil>
                </div>
            </div>
