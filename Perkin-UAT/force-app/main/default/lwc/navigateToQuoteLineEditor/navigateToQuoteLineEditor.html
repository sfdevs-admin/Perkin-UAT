<template>
    <div class="slds-clearfix">
        <div class="slds-float_right">
            <lightning-button
                    variant="neutral"
                    label="Cancel"
                    onclick={handleCancel}
                    class="slds-m-right_x-small">
            </lightning-button>
            <template if:true={showNext}>
                <lightning-button
                        variant="brand"
                        label="Next"
                        onclick={handleNext}
                        class="next-button">
                </lightning-button>
            </template>
        </div>
    </div>
</template>
