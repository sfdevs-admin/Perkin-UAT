<!-- SMAX Assign Technician -->
<template>
    <lightning-card title="Assignment Recommendation" >

        <lightning-layout pull-to-boundary="medium">

            <lightning-layout-item padding="horizontal-large" alignment-bump="right">
                <p>Technician: <lightning-formatted-text value={techName}></lightning-formatted-text></p>
                <div style="width:150px;"><lightning-input label="Start Date" type="Date" value={startDate} onchange={handleStartDateChange}></lightning-input></div>
            </lightning-layout-item>

            <lightning-layout-item padding="horizontal-large" alignment-bump="right">
                <br/>
                <div style="width:150px;"><lightning-input label="End Date" type="Date" value={endDate} onchange={handleEndDateChange}></lightning-input></div>
            </lightning-layout-item>

            <lightning-layout-item padding="horizontal-large" alignment-bump="right">
                <br/>
                <div style="width:150px;">
                    <lightning-combobox
                            name="assignment policy"
                            label="Assignment Policy"
                            value={selectedAssignmentPolicy}
                            onchange={handleAssignmentPolicyChange}
                            options={assignmentPolicies}>
                    </lightning-combobox>
                </div>
            </lightning-layout-item>

            <lightning-layout-item flexibility="auto" padding="horizontal-large">
                <br/><br/>
                <lightning-button
                        label="Get Candidates"
                        onclick={handleGetCandidatesClick}>
                </lightning-button>
            </lightning-layout-item>

        </lightning-layout>
        <br/><br/>
    </lightning-card>

    <!-- #region Get Candidates Modal Pop-Up -->
    <template if:true={showGetCandidates}>
        <div>
            <section role="dialog" tabindex="-1" aria-labelledby="modal-heading-01" aria-modal="true"
                     aria-describedby="modal-content-id-1" class="slds-modal slds-fade-in-open">
                <div class="slds-modal__container" style="width: 90%; max-width: none">
                    <header class="slds-modal__header">
                        <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse"
                                title="Close" onclick={handleGetCandidatesClose}>
                            <lightning-icon icon-name="utility:close" variant="inverse" size="medium"> </lightning-icon>
                            <span class="slds-assistive-text">Close</span>
                        </button>

                        <h2 id="get-candidates-heading-01" class="slds-text-heading_medium slds-hyphenate">
                            Candidates
                        </h2>

                    </header>

                    <div class="slds-modal__content spinner-container" id="get-candidates-id-1">
                        <div id="get-candidates-spinner" if:true={isProcessing} class="spinner-mask">
                            <lightning-spinner alternative-text="Processing" size="medium"></lightning-spinner>
                        </div>

                        <lightning-layout pull-to-boundary="medium" vertical-align="start">
                            <lightning-layout-item flexibility="auto" padding="around-large">
                                <div class="slds-p-around_medium" style="height: 400px">
                                    <c-extended-lightning-datatable
                                            key-field="Id"
                                            data={candidates}
                                            columns={candidateColumns}
                                            onrowaction={handleCandidatesRowAction}
                                            onpicklistchanged={handlePicklistChanged}
                                            onvalueselect={handleValueSelect}
                                            oncellchange={handleCellChange}
                                            onsort={onHandleSort}
                                            sorted-by={sortBy}
                                            sorted-direction={sortDirection}
                                            hide-checkbox-column>
                                            <!--draft-values={draftValues}
                                            onsave={handleSave} -->
                                    </c-extended-lightning-datatable>
                                </div>
                            </lightning-layout-item>

                        </lightning-layout>
                    </div>

                    <footer class="slds-modal__footer">
                        <lightning-layout horizontal-align="end">
                            <lightning-layout-item>
                                <lightning-button-group>
                                    <lightning-button label="Cancel" onclick={handleGetCandidatesClose}>
                                    </lightning-button>
                                </lightning-button-group>
                            </lightning-layout-item>
                        </lightning-layout>
                    </footer>
                </div>
            </section>
            <div class="slds-backdrop slds-backdrop_open"></div>
        </div>
    </template>
    <!-- #endregion Get Candidates Modal Pop-Up -->

</template>
