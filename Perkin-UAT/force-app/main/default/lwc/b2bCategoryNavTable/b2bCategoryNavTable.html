<template>
    <div class="slds-grid slds-gutters slds-m-horizontal_medium" if:false={isLoading} style="padding-left:10%">
        <template for:each={categoryWrapperList} for:item="categoryWrapper">
            <div key={categoryWrapper.technologyType} class="slds-col slds-size_1-of-1 slds-medium-size_1-of-1 slds-large-size_4-of-12">
                <div class="slds-grid slds-grid_vertical">
                    <h1 class="slds-col category-heading">{categoryWrapper.technologyType}</h1>
                    <template for:each={categoryWrapper.childCategoryList} for:item="childCategory">
                        <div class="slds-col" key={childCategory.categoryName}>
                             <!-- <div class="childCategory-label" data-categoryid={childCategory.Child_Category__c} onclick={handleNavigateToCategory}> {childCategory.Label__c} </div> -->

                             <c-b2b-category-navigator 
                                category-id={childCategory.Child_Category__c}
                                category-label={childCategory.Label__c}
                                onnavigatecategory={handleNavigateToCategory}
                                >
                            </c-b2b-category-navigator>
                        </div>
                    </template>
                </div>
            </div>  
        </template>
    </div>
</template>
