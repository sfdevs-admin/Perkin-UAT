<template>
    <template if:true={modePreview}>
        <lightning-card title="Merged PDF Viewer">
            <template if:true={mergedPdfUrl}>
                <iframe src={mergedPdfUrl} width="100%" height="1000px"></iframe>
            </template>
            <template if:false={mergedPdfUrl}>
                <lightning-spinner alternative-text="Merging in progress..."></lightning-spinner>
            </template>
        </lightning-card>
    </template>
</template>
